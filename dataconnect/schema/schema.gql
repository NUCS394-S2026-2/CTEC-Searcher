type Professor @table {
  firstName: String!
  lastName: String!
}

type Course @table {
  department: String!
  courseNumber: String!
  courseName: String!
}

type CtecOffering @table(name: "ctec_offerings") {
  professor: Professor!
  course: Course!
  year: Int!
  quarter: String!
  audience: Int!
  responsesReceived: Int!
}

type Question @table {
  offering: CtecOffering!
  questionNumber: Int!
  questionText: String!
  questionType: String! # 'likert' or 'categorical'
  responseCount: Int!
  mean: Float # null for categorical, set for likert
}

type QuestionDistribution @table {
  question: Question!
  optionLabel: String!
  count: Int!
}

type Comment @table {
  offering: CtecOffering!
  text: String!
}
