query ListCourseOfferings @auth(level: PUBLIC) {
  ctecOfferings {
    id
    year
    quarter
    audience
    responsesReceived
    commentCount
    course {
      id
      department
      courseNumber
      courseName
    }
    professor {
      id
      firstName
      lastName
    }
    questions: questions_on_offering {
      id
      questionNumber
      questionText
      questionType
      responseCount
      mean
      distributions: questionDistributions_on_question {
        optionLabel
        count
      }
    }
    comments: comments_on_offering {
      id
      text
    }
  }
}

query GetCourseOffering($id: UUID!) @auth(level: PUBLIC) {
  ctecOffering(id: $id) {
    id
    year
    quarter
    audience
    responsesReceived
    commentCount
    course {
      department
      courseNumber
      courseName
    }
    professor {
      firstName
      lastName
    }
    questions: questions_on_offering {
      questionNumber
      questionText
      questionType
      responseCount
      mean
      distributions: questionDistributions_on_question {
        optionLabel
        count
      }
    }
    comments: comments_on_offering {
      id
      text
    }
  }
}

mutation CreateProfessor(
  $firstName: String!
  $lastName: String!
) @auth(level: PUBLIC) {
  professor_insert(data: {
    firstName: $firstName
    lastName: $lastName
  })
}

mutation CreateCourse(
  $department: String!
  $courseNumber: String!
  $courseName: String!
) @auth(level: PUBLIC) {
  course_insert(data: {
    department: $department
    courseNumber: $courseNumber
    courseName: $courseName
  })
}

mutation CreateCtecOffering(
  $professorId: UUID!
  $courseId: UUID!
  $year: Int!
  $quarter: String!
  $audience: Int!
  $responsesReceived: Int!
) @auth(level: PUBLIC) {
  ctecOffering_insert(data: {
    professorId: $professorId
    courseId: $courseId
    year: $year
    quarter: $quarter
    audience: $audience
    responsesReceived: $responsesReceived
    commentCount: 0
  })
}

mutation CreateQuestion(
  $offeringId: UUID!
  $questionNumber: Int!
  $questionText: String!
  $questionType: String!
  $responseCount: Int!
  $mean: Float
) @auth(level: PUBLIC) {
  question_insert(data: {
    offeringId: $offeringId
    questionNumber: $questionNumber
    questionText: $questionText
    questionType: $questionType
    responseCount: $responseCount
    mean: $mean
  })
}

mutation CreateQuestionDistribution(
  $questionId: UUID!
  $optionLabel: String!
  $count: Int!
) @auth(level: PUBLIC) {
  questionDistribution_insert(data: {
    questionId: $questionId
    optionLabel: $optionLabel
    count: $count
  })
}

mutation CreateComment(
  $offeringId: UUID!
  $text: String!
) @auth(level: PUBLIC) {
  comment_insert(data: {
    offeringId: $offeringId
    text: $text
  })
}

