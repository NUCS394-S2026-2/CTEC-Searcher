query ListCourseOfferings @auth(level: PUBLIC) {
  ctecOfferings {
    id
    year
    quarter
    audience
    responsesReceived
    course {
      id
      department
      courseNumber
      courseName
    }
    professor {
      id
      firstName
      lastName
    }
    questions: questions_on_offering {
      id
      questionNumber
      questionText
      questionType
      responseCount
      mean
      distributions: questionDistributions_on_question {
        optionLabel
        count
      }
    }
    comments: comments_on_offering {
      id
      text
    }
  }
}

query GetCourseOffering($id: UUID!) @auth(level: PUBLIC) {
  ctecOffering(id: $id) {
    id
    year
    quarter
    audience
    responsesReceived
    course {
      department
      courseNumber
      courseName
    }
    professor {
      id
      firstName
      lastName
    }
    questions: questions_on_offering {
      questionNumber
      questionText
      questionType
      responseCount
      mean
      distributions: questionDistributions_on_question {
        optionLabel
        count
      }
    }
    comments: comments_on_offering {
      id
      text
    }
  }
}

mutation CreateProfessor(
  $firstName: String!
  $lastName: String!
) @auth(level: PUBLIC) {
  professor_insert(data: {
    firstName: $firstName
    lastName: $lastName
  })
}

mutation CreateCourse(
  $department: String!
  $courseNumber: String!
  $courseName: String!
) @auth(level: PUBLIC) {
  course_insert(data: {
    department: $department
    courseNumber: $courseNumber
    courseName: $courseName
  })
}

mutation CreateCtecOffering(
  $professorId: UUID!
  $courseId: UUID!
  $year: Int!
  $quarter: String!
  $audience: Int!
  $responsesReceived: Int!
) @auth(level: PUBLIC) {
  ctecOffering_insert(data: {
    professorId: $professorId
    courseId: $courseId
    year: $year
    quarter: $quarter
    audience: $audience
    responsesReceived: $responsesReceived
  })
}

mutation CreateQuestion(
  $offeringId: UUID!
  $questionNumber: Int!
  $questionText: String!
  $questionType: String!
  $responseCount: Int!
  $mean: Float
) @auth(level: PUBLIC) {
  question_insert(data: {
    offeringId: $offeringId
    questionNumber: $questionNumber
    questionText: $questionText
    questionType: $questionType
    responseCount: $responseCount
    mean: $mean
  })
}

mutation CreateQuestionDistribution(
  $questionId: UUID!
  $optionLabel: String!
  $count: Int!
) @auth(level: PUBLIC) {
  questionDistribution_insert(data: {
    questionId: $questionId
    optionLabel: $optionLabel
    count: $count
  })
}

mutation CreateComment(
  $offeringId: UUID!
  $text: String!
) @auth(level: PUBLIC) {
  comment_insert(data: {
    offeringId: $offeringId
    text: $text
  })
}

query GetProfessorByName($firstName: String!, $lastName: String!) @auth(level: PUBLIC) {
  professor(first: {
    where: {
      firstName: { eq: $firstName }
      lastName: { eq: $lastName }
    }
  }) {
    id
  }
}

query GetCourseByNumber($department: String!, $courseNumber: String!) @auth(level: PUBLIC) {
  course(first: {
    where: {
      department: { eq: $department }
      courseNumber: { eq: $courseNumber }
    }
  }) {
    id
  }
}

query GetOfferingByKey(
  $professorId: UUID!
  $courseId: UUID!
  $year: Int!
  $quarter: String!
) @auth(level: PUBLIC) {
  ctecOffering(first: {
    where: {
      professorId: { eq: $professorId }
      courseId: { eq: $courseId }
      year: { eq: $year }
      quarter: { eq: $quarter }
    }
  }) {
    id
  }
}

mutation UpdateCtecOffering(
  $id: UUID!
  $audience: Int!
  $responsesReceived: Int!
) @auth(level: PUBLIC) {
  ctecOffering_update(id: $id, data: {
    audience: $audience
    responsesReceived: $responsesReceived
  })
}

# Must run before DeleteOfferingQuestions due to FK constraint
mutation DeleteOfferingDistributions($offeringId: UUID!) @auth(level: PUBLIC) {
  questionDistribution_deleteMany(where: { question: { offeringId: { eq: $offeringId } } })
}

mutation DeleteOfferingQuestions($offeringId: UUID!) @auth(level: PUBLIC) {
  question_deleteMany(where: { offeringId: { eq: $offeringId } })
}

mutation DeleteOfferingComments($offeringId: UUID!) @auth(level: PUBLIC) {
  comment_deleteMany(where: { offeringId: { eq: $offeringId } })
}
