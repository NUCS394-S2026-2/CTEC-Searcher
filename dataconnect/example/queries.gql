query ListCourseOfferings @auth(level: PUBLIC) {
  courseOfferings {
    id
    year
    quarter
    section
    courseAudience
    courseResponses
    course {
      id
      department
      courseNumber
      courseName
    }
    professor {
      id
      firstName
      lastName
    }
    # Note: Comments are intentionally omitted here for list performance
    questions: questions_on_courseOffering {
      id
      questionNumber
      questionText
      category
      responseCount
      mean
      distributions: questionDistributions_on_question {
        id
        optionLabel
        count
      }
    }
  }
}

query GetCourseOffering($id: UUID!) @auth(level: PUBLIC) {
  courseOffering(id: $id) {
    id
    year
    quarter
    section
    courseAudience
    courseResponses
    course {
      department
      courseNumber
      courseName
    }
    professor {
      firstName
      lastName
    }
    comments: comments_on_courseOffering {
      id
      text
    }
    questions: questions_on_courseOffering {
      id
      questionNumber
      questionText
      category
      responseCount
      mean
      distributions: questionDistributions_on_question {
        id
        optionLabel
        count
      }
    }
  }
}

mutation CreateProfessor(
  $firstName: String!
  $lastName: String!
) @auth(level: PUBLIC) {
  professor_insert(data: {
    firstName: $firstName
    lastName: $lastName
  })
}

mutation CreateCourse(
  $department: String!
  $courseNumber: String!
  $courseName: String!
) @auth(level: PUBLIC) {
  course_insert(data: {
    department: $department
    courseNumber: $courseNumber
    courseName: $courseName
  })
}

mutation CreateCourseOffering(
  $year: Int!
  $quarter: Quarter!
  $section: String!
  $courseId: UUID!
  $professorId: UUID!
  $courseAudience: Int!
  $courseResponses: Int!
) @auth(level: PUBLIC) {
  courseOffering_insert(data: {
    year: $year
    quarter: $quarter
    section: $section
    courseId: $courseId
    professorId: $professorId
    courseAudience: $courseAudience
    courseResponses: $courseResponses
  })
}

mutation CreateComment(
  $courseOfferingId: UUID!
  $text: String!
) @auth(level: PUBLIC) {
  comment_insert(data: {
    courseOfferingId: $courseOfferingId
    text: $text
  })
}

mutation CreateQuestion(
  $courseOfferingId: UUID!
  $questionNumber: Int!
  $questionText: String!
  $category: QuestionCategory!
  $responseCount: Int!
  $mean: Float
) @auth(level: PUBLIC) {
  question_insert(data: {
    courseOfferingId: $courseOfferingId
    questionNumber: $questionNumber
    questionText: $questionText
    category: $category
    responseCount: $responseCount
    mean: $mean
  })
}

mutation CreateQuestionDistribution(
  $questionId: UUID!
  $optionLabel: String!
  $count: Int!
) @auth(level: PUBLIC) {
  questionDistribution_insert(data: {
    questionId: $questionId
    optionLabel: $optionLabel
    count: $count
  })
}

query FindCourseOffering(
  $courseId: UUID!
  $professorId: UUID!
  $year: Int!
  $quarter: Quarter!
) @auth(level: PUBLIC) {
  courseOfferings(where: {
    courseId: { eq: $courseId }
    professorId: { eq: $professorId }
    year: { eq: $year }
    quarter: { eq: $quarter }
  }) {
    id
    questions: questions_on_courseOffering {
      id
    }
  }
}

mutation DeleteQuestionDistributions($questionId: UUID!) @auth(level: PUBLIC) {
  questionDistribution_deleteMany(where: { questionId: { eq: $questionId } })
}

mutation DeleteOfferingQuestions($courseOfferingId: UUID!) @auth(level: PUBLIC) {
  question_deleteMany(where: { courseOfferingId: { eq: $courseOfferingId } })
}

mutation DeleteOfferingComments($courseOfferingId: UUID!) @auth(level: PUBLIC) {
  comment_deleteMany(where: { courseOfferingId: { eq: $courseOfferingId } })
}

mutation DeleteCourseOffering($id: UUID!) @auth(level: PUBLIC) {
  courseOffering_delete(id: $id)
}